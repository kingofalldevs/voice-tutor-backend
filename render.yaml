services:
  - type: web
    name: voice-teacher-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k gevent -w 1 --threads 100 app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
